name: Bug report
description: Report a problem with the template
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感謝回報，請盡量填寫以下欄位以便重現問題。(Thanks for the report — please fill in what you can below, so the bug can be reproduced.)
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: version
    attributes:
      label: Template version / commit
      description: The git commit SHA or tag you're using.
  - type: dropdown
    id: deploy-target
    attributes:
      label: Deploy target
      options:
        - User page (username.github.io)
        - Project page (username.github.io/repo)
        - Other / local dev
  - type: dropdown
    id: locale
    attributes:
      label: Locale
      options:
        - en
        - zh-TW
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console output, build errors, or screenshots, if relevant.
