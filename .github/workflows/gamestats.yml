name: Fetch game stats

on:
  schedule:
    # Once a day.
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - run: python3 scripts/test_fetch_gamestats.py

      # The script skips any source whose secret is absent, so this is a
      # quiet no-op until the repo secrets are configured.
      - name: Fetch stats
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          STEAM_ACCOUNTS: ${{ vars.STEAM_ACCOUNTS }}
          EXCLUDED_APPIDS: ${{ vars.EXCLUDED_APPIDS }}
          LASTFM_USER: ${{ vars.LASTFM_USER }}
        run: python3 scripts/fetch_gamestats.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/gamestats.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update game stats"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  # A push made with GITHUB_TOKEN cannot trigger deploy.yml's `push` event, so
  # publish refreshed data by calling that workflow directly.
  deploy:
    needs: fetch
    if: needs.fetch.outputs.changed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy.yml
