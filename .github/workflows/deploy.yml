name: Deploy to GitHub Pages

on:
  push:
    branches: main
  # Called by gamestats.yml, whose GITHUB_TOKEN push cannot trigger `push` above.
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Build the branch tip, not the SHA that started the run: when gamestats.yml
      # calls this workflow, its fresh data commit is newer than that SHA.
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
