name: CI

on:
  pull_request:
  push:
    branches: main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm test
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - run: python3 scripts/test_fetch_gamestats.py
