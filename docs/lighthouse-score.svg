<svg xmlns="http://www.w3.org/2000/svg" fill="none" width="1000" height="330" viewBox="0 0 1000 330" role="img" aria-label="Lighthouse scores on mobile: Performance 100, Accessibility 100, Best Practices 100, SEO 100">
  <style>
    .gauge-base { fill: none; stroke: #0cce6b; opacity: 0.15 }
    .gauge-arc { fill: none; stroke: #0cce6b; stroke-linecap: round }
    .gauge-num { fill: #0cce6b; font-size: 40px; font-family: monospace }
    .gauge-label { fill: #737373; font-size: 26px; font-family: Roboto, Helvetica, Arial, sans-serif }
    .legend-frame { fill: none; stroke: #737373; stroke-opacity: 0.35; stroke-width: 2 }
    .legend-label { fill: #737373; font-size: 22px; font-family: Roboto, Helvetica, Arial, sans-serif }
  </style>

  <svg viewBox="0 0 200 200" width="200" height="200" x="100" y="0">
    <circle class="gauge-base" r="56" cx="100" cy="60" stroke-width="8" />
    <circle class="gauge-arc" r="56" cx="100" cy="60" stroke-width="8" />
    <text class="gauge-num" x="100" y="60" dominant-baseline="central" text-anchor="middle">100</text>
    <text class="gauge-label" x="100" y="160" dominant-baseline="central" text-anchor="middle">Performance</text>
  </svg>

  <svg viewBox="0 0 200 200" width="200" height="200" x="300" y="0">
    <circle class="gauge-base" r="56" cx="100" cy="60" stroke-width="8" />
    <circle class="gauge-arc" r="56" cx="100" cy="60" stroke-width="8" />
    <text class="gauge-num" x="100" y="60" dominant-baseline="central" text-anchor="middle">100</text>
    <text class="gauge-label" x="100" y="160" dominant-baseline="central" text-anchor="middle">Accessibility</text>
  </svg>

  <svg viewBox="0 0 200 200" width="200" height="200" x="500" y="0">
    <circle class="gauge-base" r="56" cx="100" cy="60" stroke-width="8" />
    <circle class="gauge-arc" r="56" cx="100" cy="60" stroke-width="8" />
    <text class="gauge-num" x="100" y="60" dominant-baseline="central" text-anchor="middle">100</text>
    <text class="gauge-label" x="100" y="160" dominant-baseline="central" text-anchor="middle">Best Practices</text>
  </svg>

  <svg viewBox="0 0 200 200" width="200" height="200" x="700" y="0">
    <circle class="gauge-base" r="56" cx="100" cy="60" stroke-width="8" />
    <circle class="gauge-arc" r="56" cx="100" cy="60" stroke-width="8" />
    <text class="gauge-num" x="100" y="60" dominant-baseline="central" text-anchor="middle">100</text>
    <text class="gauge-label" x="100" y="160" dominant-baseline="central" text-anchor="middle">SEO</text>
  </svg>

  <svg width="604" height="76" x="198" y="248">
