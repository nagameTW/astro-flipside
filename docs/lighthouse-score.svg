    <rect rx="6" height="14" width="48" y="30" x="35" fill="#ff4e42" />
    <rect rx="6" height="14" width="48" y="30" x="220" fill="#ffa400" />
    <rect rx="6" height="14" width="48" y="30" x="410" fill="#0cce6b" />
    <text class="legend-label" text-anchor="start" y="45" x="95">0&#8211;49</text>
    <text class="legend-label" text-anchor="start" y="45" x="280">50&#8211;89</text>
    <text class="legend-label" text-anchor="start" y="45" x="470">90&#8211;100</text>
